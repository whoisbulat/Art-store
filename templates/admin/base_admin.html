<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #fef7e8;
            margin: 0;
            padding: 20px;
        }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .logout {
            float: right;
            background: #7a6b63;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            text-decoration: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #e6dbcf;
        }
        .btn {
            display: inline-block;
            background: #b8a99a;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .btn-secondary {
            background: #7a6b63;
            margin-left: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #e6dbcf;
            border-radius: 20px;
            font-family: inherit;
        }
        button {
            background: #b8a99a;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
        }
        .flash {
            background: #e1f0e8;
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <div style="overflow: auto; margin-bottom: 20px;">
            <h2 style="float: left;">Панель администратора</h2>
            <a href="{{ url_for('admin_logout') }}" class="logout">Выйти</a>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
