<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - {% if artwork %}Редактировать{% else %}Добавить{% endif %} работу</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 2rem; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; }
        label { display: block; margin: 1rem 0 0.3rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px; }
        button { margin-top: 1.5rem; background: #c4a882; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 30px; cursor: pointer; }
        button:hover { background: #b09774; }
        .back { display: inline-block; margin-top: 1rem; color: #666; text-decoration: none; }
        .current-images { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .image-item { position: relative; width: 100px; }
        .image-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; }
        .image-item.primary img { border-color: #c4a882; }
        .image-item .badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 2px 5px; border-radius: 3px; }
        .delete-img-btn { display: inline-block; margin-top: 5px; color: red; font-size: 12px; cursor: pointer; background: none; border: none; padding: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{% if artwork %}Редактировать работу{% else %}Добавить новую работу{% endif %}</h1>
        <form method="POST" enctype="multipart/form-data">
            <label>Название *</label>
            <input type="text" name="title" value="{{ artwork.title if artwork else '' }}" required>

            <label>Описание</label>
            <textarea name="description" rows="4">{{ artwork.description if artwork else '' }}</textarea>

            <label>Год</label>
            <input type="number" name="year" value="{{ artwork.year if artwork else '' }}">

            <label>Категория *</label>
            <select name="category" required>
                <option value="oil" {% if artwork and artwork.category == 'oil' %}selected{% endif %}>Oil painting</option>
                <option value="mixed_media" {% if artwork and artwork.category == 'mixed_media' %}selected{% endif %}>Mixed media</option>
                <option value="ceramics" {% if artwork and artwork.category == 'ceramics' %}selected{% endif %}>Ceramics</option>
                <option value="embroidery" {% if artwork and artwork.category == 'embroidery' %}selected{% endif %}>Embroidery</option>
            </select>

            <label>Техника (опционально)</label>
            <input type="text" name="technique" value="{{ artwork.technique if artwork else '' }}" placeholder="акрил, керамика, вышивка...">

            <label>Размер (опционально)</label>
            <input type="text" name="size" value="{{ artwork.size if artwork else '' }}" placeholder="50x70 см, 30x40x20 см...">

            <label>Основное изображение {% if not artwork %}*{% endif %}</label>
            <input type="file" name="primary_image" accept="image/*" {% if not artwork %}required{% endif %}>

            <label>Дополнительные изображения</label>
            <input type="file" name="additional_images" accept="image/*" multiple>

            {% if artwork and artwork.images %}
            <div style="margin-top: 1rem;">
                <strong>Текущие изображения:</strong>
                <div class="current-images">
                    {% for img in artwork.images %}
                    <div class="image-item {% if img.is_primary %}primary{% endif %}">
                        <img src="{{ url_for('static', filename='images/works/' + img.filename) }}" alt="img">
                        {% if img.is_primary %}
                        <span class="badge">Основное</span>
                        {% else %}
                        <form method="POST" action="{{ url_for('delete_work_image', artwork_id=artwork.id, image_id=img.id) }}" style="display:inline;">
                            <button type="submit" class="delete-img-btn" onclick="return confirm('Удалить это изображение?')">Удалить</button>
                        </form>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <button type="submit">{% if artwork %}Сохранить{% else %}Добавить{% endif %}</button>
        </form>
        <a href="/admin" class="back">← Назад к списку</a>
    </div>
</body>
</html>
