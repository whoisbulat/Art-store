<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход · Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#fafafa; display:flex; justify-content:center; align-items:center; height:100vh; font-weight:300; }
        .login-box { background:#fff; padding:3rem; border:1px solid #ececec; width:340px; }
        .login-box h2 { font-family:'Playfair Display',serif; font-weight:400; margin-bottom:1.5rem; text-align:center; }
        input { width:100%; padding:0.9rem; margin-bottom:1rem; border:1px solid #ececec; border-radius:2px; font-family:inherit; font-weight:300; }
        input:focus { outline:none; border-color:#2b2b2b; }
        button { width:100%; background:#2b2b2b; color:#fff; border:none; padding:0.9rem; border-radius:2px; cursor:pointer; text-transform:uppercase; letter-spacing:1px; font-size:0.85rem; transition:0.3s; }
        button:hover { background:#444; }
        .flash { background:#f9eeee; padding:0.8rem; border-radius:2px; margin-bottom:1rem; font-size:0.85rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Имя пользователя" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
