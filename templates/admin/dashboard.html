{% extends "base_admin.html" %}
{% block content %}
<h1>Управление работами</h1>
<a href="{{ url_for('add_artwork') }}" style="display: inline-block; margin-bottom: 20px; background: #b8a99a; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none;">+ Добавить работу</a>
<a href="{{ url_for('edit_about') }}" style="margin-left: 10px; background: #7a6b63; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none;">✎ Редактировать "Обо мне"</a>

<table style="width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden;">
    <thead style="background: #e6dbcf;">
        <tr><th>ID</th><th>Изображение</th><th>Название</th><th>Категория</th><th>Год</th><th>Действия</th></tr>
    </thead>
    <tbody>
        {% for art in artworks %}
        <tr style="border-bottom: 1px solid #eee;">
            <td>{{ art.id }}</td>
            <td><img src="{{ url_for('static', filename='images/works/' + art.image_filename) }}" width="60" style="border-radius: 8px;"></td>
            <td>{{ art.title }}</td>
            <td>{{ art.category }}</td>
            <td>{{ art.year }}</td>
            <td>
                <a href="{{ url_for('edit_artwork', id=art.id) }}">✏️</a>
                <a href="{{ url_for('delete_artwork', id=art.id) }}" onclick="return confirm('Удалить?')">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
