{% extends "base_admin.html" %}
{% block content %}
<h2 style="font-family:'Playfair Display',serif; font-weight:400; margin-bottom:1rem;">Страница "Обо мне"</h2>
<form method="POST" enctype="multipart/form-data" style="max-width:560px;">
    <label>Биография</label>
    <textarea name="bio" rows="8">{{ about.bio }}</textarea>

    <label>Email</label>
    <input type="email" name="email" value="{{ about.email or '' }}">

    <label>Instagram (ссылка)</label>
    <input type="text" name="instagram" value="{{ about.instagram or '' }}">

    <label>Telegram (ссылка)</label>
    <input type="text" name="telegram" value="{{ about.telegram or '' }}">

    <label>Фото профиля</label>
    <input type="file" name="photo" accept="image/*">
    {% if about.photo_filename %}
        <div class="current-images">
            <div class="image-item"><img src="{{ url_for('static', filename='images/works/' + about.photo_filename) }}" alt=""></div>
        </div>
    {% endif %}

    <div style="margin-top:2rem;">
        <button type="submit" class="btn">Сохранить</button>
    </div>
</form>
<a href="/admin" class="back-link">← Назад</a>
{% endblock %}
