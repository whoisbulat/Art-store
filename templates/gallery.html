{% extends "base.html" %}

{% block title %}Gallery — Anastasia Zaitseva{% endblock %}

{% block extra_head %}
<meta name="description" content="Browse and buy original artworks by Anastasia Zaitseva — paintings, ceramics, mixed media and embroidery.">
{% endblock %}

{% block content %}
<section class="gallery-section" style="padding-top:2rem;">
    <div class="container">
        <h1 class="section-title">Gallery</h1>
        <p class="section-subtitle">Each piece is an original, created in a single copy.</p>

        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All works</button>
            <button class="filter-btn" data-filter="oil">Oil painting</button>
            <button class="filter-btn" data-filter="mixed_media">Mixed media</button>
            <button class="filter-btn" data-filter="ceramics">Ceramics</button>
            <button class="filter-btn" data-filter="embroidery">Embroidery</button>
        </div>

        <div class="gallery-grid" id="gallery-grid"></div>
    </div>
</section>

<!-- ===== МОДАЛЬНОЕ ОКНО ДЕТАЛЕЙ ===== -->
<div class="detail-modal-overlay" id="detail-modal">
    <div class="detail-modal" id="detail-modal-box">
        <button class="detail-close" id="detail-close" aria-label="Close">&times;</button>
        <div class="detail-image-side" id="detail-image-side"></div>
        <div class="detail-info-side" id="detail-info-side"></div>
    </div>
</div>

<script>
    // ===== КОНФИГ КОНТАКТОВ (заполните своими данными) =====
    const CONTACT = {
        whatsapp: '79991234567',          // номер без + и пробелов
        telegram: 'anastasia',            // username без @
        email: 'anastasia@artmail.com'
    };

    let artworksCache = [];

    async function loadArtworks() {
        try {
            const res = await fetch('/api/artworks');
            artworksCache = await res.json();
            renderGallery(artworksCache);
            initFilters();
            handleDeepLink();
        } catch (err) {
            console.error('Ошибка загрузки работ:', err);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    }

    function renderGallery(artworks) {
        const grid = document.getElementById('gallery-grid');
        if (!grid) return;
        grid.innerHTML = '';
        artworks.forEach(art => {
            const images = art.images || [];
            const hasMultiple = images.length > 1;

            const carouselHTML = `
                <div class="carousel-container">
                    <div class="carousel-images">
                        ${images.map((img, idx) => `
                            <img src="/static/images/works/${img}" class="carousel-img ${idx === 0 ? 'active' : ''}" alt="${escapeHtml(art.title)} — ${escapeHtml(art.technique || art.category)}">
                        `).join('')}
                    </div>
                    ${hasMultiple ? `
                        <button class="carousel-prev">‹</button>
                        <button class="carousel-next">›</button>
                        <div class="carousel-dots">
                            ${images.map((_, idx) => `<span class="dot ${idx === 0 ? 'active' : ''}"></span>`).join('')}
                        </div>` : ''}
                </div>`;

            const card = document.createElement('div');
            card.className = 'gallery-item';
            card.setAttribute('data-category', art.category);
            card.setAttribute('data-id', art.id);

            const photoArea = document.createElement('div');
            photoArea.className = 'gallery-photo-area';
            photoArea.innerHTML = carouselHTML;
            photoArea.addEventListener('click', () => openDetail(art.id));

            const infoArea = document.createElement('div');
            infoArea.className = 'gallery-info';
            infoArea.style.cursor = 'pointer';
            infoArea.innerHTML = `
                <h3>${escapeHtml(art.title)}</h3>
                <p>${escapeHtml(art.description || '')}</p>
                <div class="gallery-meta">
                    <span>${art.year || ''}</span>
                    <span>${art.size || ''}</span>
                    <span>${escapeHtml(art.technique || art.category)}</span>
                </div>
                <div class="gallery-card-footer">
                    ${art.price ? `<span class="artwork-price">$${art.price}</span>`
                                : `<span class="artwork-price price-request">Price on request</span>`}
                    <span class="btn btn-outline" style="padding:0.5rem 1.4rem;font-size:0.7rem;">Details</span>
                </div>`;
            infoArea.addEventListener('click', () => openDetail(art.id));

            card.appendChild(photoArea);
            card.appendChild(infoArea);
            grid.appendChild(card);

            if (hasMultiple) initCardCarousel(card);
        });
    }

    function initCardCarousel(card) {
        const prevBtn = card.querySelector('.carousel-prev');
        const nextBtn = card.querySelector('.carousel-next');
        const dots = card.querySelectorAll('.carousel-dots .dot');

        const setSlide = (index) => {
            const imgs = card.querySelectorAll('.carousel-img');
            imgs.forEach((img, i) => img.classList.toggle('active', i === index));
            dots.forEach((d, i) => d.classList.toggle('active', i === index));
        };
        const change = (dir) => {
            const imgs = card.querySelectorAll('.carousel-img');
            let cur = Array.from(imgs).findIndex(i => i.classList.contains('active'));
            let n = (cur + dir + imgs.length) % imgs.length;
            setSlide(n);
        };
        prevBtn.addEventListener('click', e => { e.stopPropagation(); change(-1); });
        nextBtn.addEventListener('click', e => { e.stopPropagation(); change(1); });
        dots.forEach((d, i) => d.addEventListener('click', e => { e.stopPropagation(); setSlide(i); }));
    }

    function initFilters() {
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.getAttribute('data-filter');
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.gallery-item').forEach(item => {
                    item.style.display = (filter === 'all' || item.getAttribute('data-category') === filter) ? 'block' : 'none';
                });
            });
        });
    }

    // ===== МОДАЛЬНОЕ ОКНО ДЕТАЛЕЙ =====
    const overlay = document.getElementById('detail-modal');
    const imageSide = document.getElementById('detail-image-side');
    const infoSide = document.getElementById('detail-info-side');
    const closeBtn = document.getElementById('detail-close');

    closeBtn.addEventListener('click', closeDetail);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    async function openDetail(id) {
        try {
            const res = await fetch(`/api/artwork/${id}`);
            const art = await res.json();
            buildDetail(art);
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            // обновляем URL для шеринга
            history.replaceState(null, '', `/gallery?artwork=${id}`);
        } catch (err) { console.error(err); }
    }

    function closeDetail() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        history.replaceState(null, '', '/gallery');
    }

    function buildDetail(art) {
        const images = art.images || [];
        const priceText = art.price ? `$${art.price}` : 'Price on request';

        // сообщение для мессенджеров
        const msg = `Здравствуйте! Меня интересует картина "${art.title}", цена ${art.price ? '$'+art.price : 'по запросу'}. Есть ли она в наличии?`;
        const enc = encodeURIComponent(msg);
        const shareUrl = `${window.location.origin}/gallery?artwork=${art.id}`;

        // изображения
        imageSide.innerHTML = `
            ${images.map((img, idx) => `<img src="/static/images/works/${img}" class="detail-slide ${idx===0?'active':''}" alt="${escapeHtml(art.title)}">`).join('')}
            ${images.length > 1 ? `
                <button class="detail-nav prev">‹</button>
                <button class="detail-nav next">›</button>
                <div class="detail-thumbs">
                    ${images.map((_, idx) => `<span class="dot ${idx===0?'active':''}"></span>`).join('')}
                </div>` : ''}
        `;

        // инфо
        infoSide.innerHTML = `
            <h2>${escapeHtml(art.title)}</h2>
            <div class="detail-price ${art.price ? '' : 'request'}">${priceText}</div>

            <div class="detail-specs">
                ${art.size ? specRow('Dimensions', art.size) : ''}
                ${art.technique ? specRow('Materials', art.technique) : ''}
                ${art.year ? specRow('Year', art.year) : ''}
                ${specRow('Category', formatCategory(art.category))}
            </div>

            ${art.description ? `<div class="detail-description">${escapeHtml(art.description)}</div>` : ''}

            <div class="buy-block">
                <p class="buy-label">Buy / Inquire</p>
                <div class="buy-buttons">
                    <a class="buy-btn wa" href="https://wa.me/${CONTACT.whatsapp}?text=${enc}" target="_blank">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a class="buy-btn tg" href="https://t.me/${CONTACT.telegram}?text=${enc}" target="_blank">
                        <i class="fab fa-telegram"></i> Telegram
                    </a>
                    <a class="buy-btn em" href="mailto:${CONTACT.email}?subject=${encodeURIComponent('Inquiry: ' + art.title)}&body=${enc}">
                        <i class="fas fa-envelope"></i> Email
                    </a>
                </div>
                <button class="share-link" onclick="copyShare('${shareUrl}', this)">
                    <i class="fas fa-link"></i> <span>Copy link to this artwork</span>
                </button>
            </div>
        `;

        if (images.length > 1) initDetailCarousel();
    }

    function specRow(label, value) {
        return `<div class="spec-row"><span class="spec-label">${label}</span><span class="spec-value">${escapeHtml(value)}</span></div>`;
    }

    function formatCategory(cat) {
        const map = { oil:'Oil painting', mixed_media:'Mixed media', ceramics:'Ceramics', embroidery:'Embroidery' };
        return map[cat] || cat;
    }

    function initDetailCarousel() {
        const slides = imageSide.querySelectorAll('.detail-slide');
        const dots = imageSide.querySelectorAll('.detail-thumbs .dot');
        const prev = imageSide.querySelector('.detail-nav.prev');
        const next = imageSide.querySelector('.detail-nav.next');
        let cur = 0;
        const show = (i) => {
            cur = (i + slides.length) % slides.length;
            slides.forEach((s, idx) => s.classList.toggle('active', idx === cur));
            dots.forEach((d, idx) => d.classList.toggle('active', idx === cur));
        };
        prev.addEventListener('click', () => show(cur - 1));
        next.addEventListener('click', () => show(cur + 1));
        dots.forEach((d, i) => d.addEventListener('click', () => show(i)));
    }

    function copyShare(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
            const span = btn.querySelector('span');
            const original = span.textContent;
            btn.classList.add('copied');
            span.textContent = 'Link copied!';
            setTimeout(() => { span.textContent = original; btn.classList.remove('copied'); }, 2000);
        });
    }

    // ===== Прямая ссылка ?artwork=ID =====
    function handleDeepLink() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('artwork');
        if (id) openDetail(id);
    }

    loadArtworks();
</script>
{% endblock %}
